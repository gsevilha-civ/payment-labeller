<h2 class="sr-only">Dashboard de calidad de tráfico con comparativas interanuales</h2>
<div style="padding:0 0 2rem;background:#0a0a0b;color:#fafafa">
  <div style="display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:1px solid #27272a">
    <div>
      <p style="font-size:11px;color:#a1a1aa;margin:0 0 6px;letter-spacing:.06em">Payment intelligence</p>
      <h2 style="font-size:22px;font-weight:500;margin:0;color:#fafafa">Traffic &amp; authorization monitor</h2>
    </div>
    <div style="display:flex;align-items:center;gap:12px">
      <span style="display:flex;align-items:center;gap:6px;font-size:12px;font-weight:500;color:#4ade80;background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.35);border-radius:100px;padding:4px 14px">
        <span id="pdot" style="width:6px;height:6px;border-radius:50%;background:currentColor;display:inline-block"></span>Live
      </span>
      <code id="ts" style="font-size:11px;color:#a1a1aa;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace"></code>
    </div>
  </div>

  <p style="font-size:11px;font-weight:500;color:#a1a1aa;margin:0 0 10px;letter-spacing:.04em">Clasificación de tráfico — intentos</p>
  <div style="background:#141416;border:1px solid #27272a;border-radius:16px;padding:1.25rem 1.5rem;margin-bottom:1.25rem">
    <div id="spec" style="height:8px;border-radius:9999px;display:flex;gap:0;overflow:hidden;margin-bottom:1.25rem;box-shadow:inset 0 0 0 1px rgba(255,255,255,.04)"></div>
    <div id="tgrid" style="display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px"></div>
  </div>

  <p style="font-size:11px;font-weight:500;color:#a1a1aa;margin:0 0 10px;letter-spacing:.04em">Por carrito (mismo riesgo por pnr, peor intento manda)</p>
  <div style="background:#141416;border:1px solid #27272a;border-radius:16px;padding:1.25rem 1.5rem;margin-bottom:0">
    <div id="specCart" style="height:8px;border-radius:9999px;display:flex;gap:0;overflow:hidden;margin-bottom:1.25rem;box-shadow:inset 0 0 0 1px rgba(255,255,255,.04)"></div>
    <div id="tgridCart" style="display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px"></div>
  </div>
</div>

<script>
const yoyBadge = (d) => {
  if (d === null || d === undefined) return "";
  const u = d >= 0;
  const bg = u ? "rgba(34,197,94,.2)" : "rgba(127,29,29,.55)";
  const fg = u ? "#86efac" : "#fecaca";
  const br = u ? "1px solid rgba(34,197,94,.4)" : "1px solid rgba(248,113,113,.25)";
  return `<span style="font-size:10px;font-weight:600;padding:3px 8px;border-radius:8px;background:${bg};color:${fg};border:${br}">${u ? "+" : ""}${d.toFixed(1)}pp YoY</span>`;
};

/**
 * Sparkline en %: eje Y con rango [lo,hi] derivado del historial + margen,
 * acotado a [0,100] para que la polyline siga los cambios reales sin aplastar ruido extremo.
 */
const sparkLayout = (data, W, H) => {
  const n = data.length;
  if (!n) return { pts: `0,${H / 2} ${W},${H / 2}`, lx: W, ly: H / 2 };
  const nums = data.map((v) => {
    const x = Number(v);
    return isNaN(x) ? 0 : x;
  });
  let mn = Math.min(...nums);
  let mx = Math.max(...nums);
  if (!isFinite(mn) || !isFinite(mx)) {
    mn = 0;
    mx = 1;
  }
  const span = mx - mn;
  const pad = span < 0.05 ? 1.2 : Math.max(span * 0.14, 0.6);
  let lo = Math.max(0, mn - pad);
  let hi = Math.min(100, mx + pad);
  if (hi - lo < 0.15) {
    lo = Math.max(0, mn - 1);
    hi = Math.min(100, mx + 1);
  }
  if (hi <= lo) hi = lo + 0.5;
  const padY = H * 0.1;
  const plotH = H - 2 * padY;
  const xAt = (i) => (n === 1 ? W / 2 : (i * W) / (n - 1));
  const yAt = (v) => padY + plotH * (1 - (v - lo) / (hi - lo));
  const pts = nums.map((v, i) => `${xAt(i).toFixed(1)},${yAt(v).toFixed(1)}`).join(" ");
  const ly = yAt(nums[n - 1]);
  return { pts, lx: W, ly: ly.toFixed(1) };
};

const ts = document.getElementById("ts");
const upTS = () =>
  (ts.textContent = new Date().toLocaleString("es-ES", {
    day: "2-digit",
    month: "short",
    year: "numeric",
    hour: "2-digit",
    minute: "2-digit",
    second: "2-digit"
  }));
upTS();
setInterval(upTS, 1000);
let pOp = 1;
setInterval(() => {
  pOp = pOp === 1 ? 0.35 : 1;
  document.getElementById("pdot").style.opacity = pOp;
}, 900);

function renderTrafficClass(TRAFFIC, specId, tgridId, countNoun) {
  const spec = document.getElementById(specId || "spec");
  const tgrid = document.getElementById(tgridId || "tgrid");
  const noun = countNoun || "intentos";
  if (!spec || !tgrid) return;
  spec.innerHTML = "";
  tgrid.innerHTML = "";
  const minFlex = 0.35;
  const SPARK_LEN = 30;
  const VB_W = 140;
  const VB_H = 32;
  TRAFFIC.forEach((t) => {
    const d = document.createElement("div");
    const flexVal = Math.max(minFlex, t.pct || 0);
    d.style.cssText = `flex:${flexVal};background:${t.color};height:100%;min-width:0`;
    spec.appendChild(d);
  });
  TRAFFIC.forEach((t) => {
    const W = VB_W;
    const H = VB_H;
    const cur = Number(t.pct);
    const curN = isNaN(cur) ? 0 : cur;
    let spark = (Array.isArray(t.spark) ? t.spark : []).map((v) => {
      const n = Number(v);
      return isNaN(n) ? curN : n;
    });
    if (!spark.length) spark = [curN];
    if (spark.length < SPARK_LEN) {
      const pad = Array(SPARK_LEN - spark.length).fill(curN);
      spark = pad.concat(spark);
    } else if (spark.length > SPARK_LEN) {
      spark = spark.slice(-SPARK_LEN);
    }
    const { pts, lx, ly } = sparkLayout(spark, W, H);
    const el = document.createElement("div");
    el.style.cssText =
      "background:#1c1c1f;border:1px solid #2e2e32;border-radius:14px;padding:14px 16px;min-width:0";
    el.innerHTML = `
    <p style="font-size:11px;font-weight:600;color:${t.color};margin:0 0 6px">${t.label}</p>
    <div style="display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;margin-bottom:4px">
      <span style="font-size:32px;font-weight:600;line-height:1;color:#fafafa">${t.pct}%</span>
      ${yoyBadge(t.yoy)}
    </div>
    <p style="font-size:11px;color:#d4d4d8;margin:0 0 10px">${t.cnt} ${noun}</p>
    <div style="border-radius:10px;overflow:hidden;background:rgba(0,0,0,.2);padding:0 2px">
    <svg viewBox="0 0 ${VB_W} ${VB_H}" preserveAspectRatio="none" style="width:100%;height:${VB_H}px;overflow:visible;display:block;vertical-align:middle">
      <polyline points="${pts}" fill="none" stroke="${t.color}" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" opacity=".95"/>
      <circle cx="${lx}" cy="${ly}" r="3" fill="${t.color}"/>
    </svg>
    </div>`;
    tgrid.appendChild(el);
  });
}

function loadTrafficFromServer() {
  const tgrid = document.getElementById("tgrid");
  const spec = document.getElementById("spec");
  spec.innerHTML = "";
  tgrid.innerHTML =
    '<p style="grid-column:1/-1;font-size:12px;color:#a1a1aa;margin:0">Cargando datos de riesgo…</p>';
  google.script.run
    .withSuccessHandler(function (data) {
      if (!data || !Array.isArray(data.traffic)) {
        tgrid.innerHTML =
          '<p style="grid-column:1/-1;color:#f87171;font-size:12px">Respuesta inválida del servidor.</p>';
        return;
      }
      renderTrafficClass(data.traffic, "spec", "tgrid", "intentos");
      const tc = data.traffic_cart;
      if (Array.isArray(tc) && tc.length) {
        renderTrafficClass(tc, "specCart", "tgridCart", "carritos (pnr)");
      } else {
        const s = document.getElementById("specCart");
        const g = document.getElementById("tgridCart");
        if (s) s.innerHTML = "";
        if (g) {
          g.innerHTML =
            '<p style="grid-column:1/-1;font-size:11px;color:#a1a1aa;margin:0">Actualiza la hoja analítica para ver carritos por riesgo.</p>';
        }
      }
    })
    .withFailureHandler(function (err) {
      spec.innerHTML = "";
      tgrid.innerHTML =
        '<p style="grid-column:1/-1;color:#f87171;font-size:12px">No se pudieron cargar los datos: ' +
        (err && err.message ? String(err.message) : String(err)) +
        "</p>";
    })
    .getDashboardDataFromSheet();
}

if (typeof google !== "undefined" && google.script && google.script.run) {
  loadTrafficFromServer();
} else {
  document.getElementById("spec").innerHTML = "";
  document.getElementById("tgrid").innerHTML =
    '<p style="grid-column:1/-1;font-size:12px;color:#a1a1aa">Abre esta vista como aplicación web (Implementar) para ver datos en vivo.</p>';
}
</script>
