<h2 class="sr-only">Dashboard de calidad de tráfico con comparativas interanuales</h2>
<div style="padding:0 0 2rem">
  <div style="display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:0.5px solid var(--color-border-tertiary)">
    <div>
      <p style="font-size:11px;color:var(--color-text-secondary);margin:0 0 6px;letter-spacing:.06em">Payment intelligence</p>
      <h2 style="font-size:22px;font-weight:500;margin:0">Traffic &amp; authorization monitor</h2>
    </div>
    <div style="display:flex;align-items:center;gap:12px">
      <span style="display:flex;align-items:center;gap:6px;font-size:12px;font-weight:500;color:var(--color-text-success);background:var(--color-background-success);border:0.5px solid var(--color-border-success);border-radius:100px;padding:4px 14px">
        <span id="pdot" style="width:6px;height:6px;border-radius:50%;background:currentColor;display:inline-block"></span>Live
      </span>
      <code id="ts" style="font-size:11px;color:var(--color-text-secondary)"></code>
    </div>
  </div>

  <p style="font-size:11px;font-weight:500;color:var(--color-text-secondary);margin:0 0 10px;letter-spacing:.04em">Clasificación de tráfico</p>
  <div style="background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1.25rem 1.5rem;margin-bottom:1.75rem">
    <div id="spec" style="height:5px;border-radius:100px;display:flex;gap:3px;overflow:hidden;margin-bottom:1.25rem"></div>
    <div id="tgrid" style="display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px"></div>
  </div>
</div>

<script>
const yoyBadge=(d,label)=>{
  if(d===null||d===undefined)return'';
  const u=d>=0;
  return `<span style="font-size:10px;font-weight:500;padding:2px 7px;border-radius:4px;background:${u?'var(--color-background-success)':'var(--color-background-danger)'};color:${u?'var(--color-text-success)':'var(--color-text-danger)'}">${u?'+':''}${d.toFixed(1)}pp YoY</span>`;
};
const spPts=(data,W,H)=>{
  const mn=Math.min(...data),mx=Math.max(...data),rg=mx-mn||1;
  return data.map((v,i)=>`${(i*W/(data.length-1)).toFixed(1)},${(H-((v-mn)/rg)*H*.85).toFixed(1)}`).join(' ');
};
const lastY=(data,H)=>{
  const mn=Math.min(...data),mx=Math.max(...data),rg=mx-mn||1;
  return(H-((data[data.length-1]-mn)/rg)*H*.85).toFixed(1);
};

const ts=document.getElementById('ts');
const upTS=()=>ts.textContent=new Date().toLocaleString('es-ES',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit',second:'2-digit'});
upTS();setInterval(upTS,1000);
let pOp=1;
setInterval(()=>{pOp=pOp===1?.3:1;document.getElementById('pdot').style.opacity=pOp;},900);

function renderTrafficClass(TRAFFIC){
  const spec=document.getElementById('spec');
  const tgrid=document.getElementById('tgrid');
  spec.innerHTML='';
  tgrid.innerHTML='';
  const minFlex=.5;
  TRAFFIC.forEach(t=>{
    const d=document.createElement('div');
    const flexVal=Math.max(minFlex,t.pct||0);
    d.style.cssText=`flex:${flexVal};background:${t.color};height:100%;border-radius:100px`;
    spec.appendChild(d);
  });
  TRAFFIC.forEach(t=>{
    const W=100,H=24;
    const spark=Array.isArray(t.spark)&&t.spark.length?t.spark:[t.pct,t.pct,t.pct,t.pct,t.pct,t.pct,t.pct];
    const pts=spPts(spark,W,H);
    const ly=lastY(spark,H);
    const el=document.createElement('div');
    el.style.cssText=`background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:12px 14px`;
    el.innerHTML=`
    <p style="font-size:10px;font-weight:500;color:${t.color};margin:0 0 4px">${t.label}</p>
    <div style="display:flex;align-items:baseline;gap:8px;margin-bottom:2px">
      <span style="font-size:28px;font-weight:500;line-height:1;color:var(--color-text-primary)">${t.pct}%</span>
      ${yoyBadge(t.yoy)}
    </div>
    <p style="font-size:11px;color:var(--color-text-secondary);margin:0 0 10px;font-family:var(--font-mono)">${t.cnt} intentos</p>
    <svg viewBox="0 0 ${W} ${H}" style="width:100%;height:${H}px;overflow:visible">
      <polyline points="${pts}" fill="none" stroke="${t.color}" stroke-width="1.5" stroke-linejoin="round" opacity=".7"/>
      <circle cx="${W}" cy="${ly}" r="2.5" fill="${t.color}"/>
    </svg>`;
    tgrid.appendChild(el);
  });
}

function loadTrafficFromServer(){
  const tgrid=document.getElementById('tgrid');
  const spec=document.getElementById('spec');
  spec.innerHTML='';
  tgrid.innerHTML='<p style="grid-column:1/-1;font-size:12px;color:var(--color-text-secondary);margin:0">Cargando datos de riesgo…</p>';
  google.script.run
    .withSuccessHandler(function(data){
      if(!data||!Array.isArray(data.traffic)){tgrid.innerHTML='<p style="grid-column:1/-1;color:var(--color-text-danger);font-size:12px">Respuesta inválida del servidor.</p>';return;}
      renderTrafficClass(data.traffic);
    })
    .withFailureHandler(function(err){
      spec.innerHTML='';
      tgrid.innerHTML='<p style="grid-column:1/-1;color:var(--color-text-danger);font-size:12px">No se pudieron cargar los datos: '+(err&&err.message?String(err.message):String(err))+'</p>';
    })
    .getDashboardDataFromSheet();
}

if(typeof google!=='undefined'&&google.script&&google.script.run){
  loadTrafficFromServer();
}else{
  document.getElementById('spec').innerHTML='';
  document.getElementById('tgrid').innerHTML='<p style="grid-column:1/-1;font-size:12px;color:var(--color-text-secondary)">Abre esta vista como aplicación web (Implementar) para ver datos en vivo.</p>';
}
</script>
